name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

env:
  GH_TOKEN: ${{ github.token }}
  MOON_IGNORE_POSTADD: "1"

jobs:
  bevy-parity-artifacts:
    name: bevy parity artifacts
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch pinned Bevy baseline
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/fetch_bevy.sh

      - name: Check parity matrix artifacts and ownership
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/generate_bevy_example_parity.py --check

  bevy-wgsl-modules:
    name: bevy WGSL modules
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch pinned Bevy baseline
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/fetch_bevy.sh

      - name: Check synced Bevy WGSL modules
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/check_bevy_wgsl_modules.sh

  engine-native:
    name: engine (native check/test/build)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.moon/bin:$PATH"
          moon version

      - name: Update MoonBit registry
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon update

      - name: moon check (native)
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon -C mgstudio-engine check --target native

      - name: moon test (native build-only)
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon -C mgstudio-engine test --target native --build-only

      - name: representative native builds
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon -C mgstudio-engine build --target native examples/2d/sprite
          moon -C mgstudio-engine build --target native examples/2d/2d_shapes
          moon -C mgstudio-engine build --target native examples/3d/pbr
          moon -C mgstudio-engine build --target native examples/3d/3d_shapes
          moon -C mgstudio-engine build --target native examples/3d/3d_scene
          moon -C mgstudio-engine build --target native examples/ui/button

  engine-examples-smoke:
    name: engine examples (native smoke)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.moon/bin:$PATH"
          moon version

      - name: Update MoonBit registry
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon update

      - name: Native smoke gate for representative examples
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          ./scripts/smoke_bevy_examples.sh
