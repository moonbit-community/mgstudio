name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

env:
  # Needed for dependencies that use `gh` in postadd hooks (e.g. wgpu_mbt).
  GH_TOKEN: ${{ github.token }}
  # CI should be able to run without relying on postadd side effects.
  MOON_IGNORE_POSTADD: "1"

jobs:
  bevy-parity-artifacts:
    name: bevy parity artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch pinned Bevy baseline
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/fetch_bevy.sh

      - name: Check parity matrix artifacts and ownership
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/generate_bevy_example_parity.py --check

  host-abi:
    name: host ABI consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check mgstudio_host ABI
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/check_host_abi.py

  engine:
    name: engine (moon check/test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.moon/bin:$PATH"
          moon version

      - name: Update MoonBit registry
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon update

      - name: mgstudio gen --check (silent)
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          ./scripts/check_codegen_clean.sh

      - name: moon check
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon -C mgstudio-engine check

      - name: moon test
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          # Build test artifacts in CI. Executing wasm tests here requires a
          # host import harness (`mgstudio_host`) that is not wired in this job.
          moon -C mgstudio-engine test --build-only

  engine-examples-smoke:
    name: engine examples (build + smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.moon/bin:$PATH"
          moon version

      - name: Update MoonBit registry
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon update

      - name: Smoke gate for representative Bevy parity examples
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          ./scripts/smoke_bevy_examples.sh

  runtime-native-wasmtime:
    name: runtime/native-wasmtime (cargo check/test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install native dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: cargo check
        shell: bash
        run: |
          set -euo pipefail
          cargo check --manifest-path mgstudio-runtime/native-wasmtime/Cargo.toml

      - name: cargo test
        shell: bash
        run: |
          set -euo pipefail
          cargo test --manifest-path mgstudio-runtime/native-wasmtime/Cargo.toml

  runtime-web:
    name: runtime/web (moon check/test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.moon/bin:$PATH"
          moon version

      - name: Update MoonBit registry
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon update

      - name: moon check
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon -C mgstudio-runtime/web clean
          moon -C mgstudio-runtime/web check

      - name: moon test
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon -C mgstudio-runtime/web test
