name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

env:
  GH_TOKEN: ${{ github.token }}
  MOON_IGNORE_POSTADD: "1"

jobs:
  parity-static-gates:
    name: parity static gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Bevy baseline
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/fetch_bevy.sh

      - name: Parity hard gates (static subset)
        shell: bash
        run: |
          set -euo pipefail
          export MGSTUDIO_PARITY_SKIP_VISUAL=1
          ./mgstudio-engine/scripts/parity_hard_gates.sh

  parity-visual-runtime:
    name: parity visual runtime gate
    runs-on: macos-latest
    env:
      MGSTUDIO_PARITY_REQUIRE_SANITY: "1"
      MGSTUDIO_PARITY_ARTIFACT_DIR: ${{ github.workspace }}/.private/parity/artifacts/ci_visual_runtime
      MGSTUDIO_3D_EXAMPLES_FILTER: "^(3d_shapes|pbr|3d_scene)$"
      MGSTUDIO_3D_EXAMPLES_MAX_CASES: "3"
      MGSTUDIO_WINDOW_FRAME_LIMIT: "120"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.moon/bin:$PATH"
          moon version

      - name: Install visual gate Python deps
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user Pillow

      - name: Update MoonBit registry
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon update

      - name: Visual runtime gate
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          ./mgstudio-engine/scripts/gate_visual_runtime.sh

      - name: Upload visual gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-visual-runtime
          path: .private/parity/artifacts/ci_visual_runtime

  engine-native:
    name: engine (native check/test/build)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.moon/bin:$PATH"
          moon version

      - name: Update MoonBit registry
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon update

      - name: moon check (native)
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon -C mgstudio-engine check --target native

      - name: moon test (native build-only)
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon -C mgstudio-engine test --target native --build-only

      - name: representative native builds
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon -C mgstudio-engine build --target native examples/2d/sprite
          moon -C mgstudio-engine build --target native examples/2d/2d_shapes
          moon -C mgstudio-engine build --target native examples/3d/pbr
          moon -C mgstudio-engine build --target native examples/3d/3d_shapes
          moon -C mgstudio-engine build --target native examples/3d/3d_scene
          moon -C mgstudio-engine build --target native examples/ui/button

  engine-examples-smoke:
    name: engine examples (native smoke)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.moon/bin:$PATH"
          moon version

      - name: Update MoonBit registry
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon update

      - name: Native smoke gate for representative examples
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          moon -C mgstudio-engine build --target native examples/2d/sprite
          moon -C mgstudio-engine build --target native examples/2d/2d_shapes
          moon -C mgstudio-engine build --target native examples/3d/pbr
          moon -C mgstudio-engine build --target native examples/3d/3d_shapes
          moon -C mgstudio-engine build --target native examples/3d/3d_scene
          moon -C mgstudio-engine build --target native examples/ui/button
          moon -C mgstudio-engine build --target native examples/input/gamepad_input_events
