<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moon Game Studio</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0b0f16;
        color: #ffffff;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .menu {
        position: fixed;
        left: 16px;
        top: 16px;
        bottom: 16px;
        padding: 12px 16px;
        background: rgba(8, 12, 20, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        color: #f6f8ff;
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: min(760px, calc(100vw - 32px));
        overflow: auto;
      }
      .menu h1 {
        font-size: 12px;
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(246, 248, 255, 0.7);
      }
      .menu-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        align-items: start;
      }
      .example-group {
        display: grid;
        gap: 8px;
      }
      .example-group h2 {
        margin: 0;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: rgba(246, 248, 255, 0.65);
      }
      .example-buttons {
        display: grid;
        gap: 8px;
      }
      .menu button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 8px 10px;
        background: rgba(28, 36, 58, 0.9);
        color: #f6f8ff;
        cursor: pointer;
        font-size: 12px;
        text-align: left;
      }
      .menu button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <canvas id="mgstudio-canvas"></canvas>
    <div id="mgstudio-menu" class="menu">
      <h1>Examples</h1>
      <div class="menu-grid">
        <!-- __EXAMPLE_GROUPS__ -->
      </div>
    </div>
    <script type="module" src="./mgstudio-runtime-web.js"></script>
  </body>
</html>
