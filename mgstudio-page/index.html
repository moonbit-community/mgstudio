<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moon Game Studio Native Examples</title>
    <style>
      :root {
        --content-max-width: 1120px;
        --bg: #f5f6f8;
        --text: #1f2328;
        --card: #ffffff;
        --line: #d0d7de;
        --accent: #0a7a5d;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top right, #e7f9f4, var(--bg) 40%);
      }
      main {
        width: min(100%, var(--content-max-width));
        margin: 0 auto;
        padding: 28px 16px 36px;
        display: grid;
        gap: 20px;
      }
      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.2;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px;
      }
      .panel h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }
      .panel p {
        margin: 0;
        line-height: 1.5;
      }
      .quickstart code,
      .example-card code {
        display: block;
        margin-top: 8px;
        padding: 8px 10px;
        border-radius: 8px;
        background: #f6f8fa;
        border: 1px solid var(--line);
        font-family: "IBM Plex Mono", Menlo, monospace;
        font-size: 12px;
        overflow: auto;
      }
      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .example-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
        display: grid;
        gap: 8px;
      }
      .example-card h3 {
        margin: 0;
        font-size: 15px;
      }
      .example-meta {
        margin: 0;
        color: #57606a;
        font-size: 12px;
      }
      .example-card a {
        color: var(--accent);
        font-size: 12px;
        text-decoration: none;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      .links a {
        color: var(--accent);
        text-decoration: none;
      }
      @media (max-width: 980px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (max-width: 640px) {
        h1 {
          font-size: 24px;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Moon Game Studio Native Examples</h1>
      </section>

      <section class="panel quickstart">
        <h2>Quick Start (Native)</h2>
        <p>This repository is native-only. Web runtime and WASM runner were removed.</p>
        <code>moon -C mgstudio-engine run --target native examples/3d/3d_scene</code>
      </section>

      <section class="panel">
        <h2>Example Catalog</h2>
        <div class="grid">
          <!-- __EXAMPLE_CARDS__ -->
        </div>
      </section>

      <section class="panel">
        <h2>Parity Resources</h2>
        <div class="links">
          <a href="../docs/parity/README.md">Parity Overview</a>
          <a href="../docs/parity/notes/3d_3d_scene.md">3d_scene Note</a>
        </div>
      </section>
    </main>
  </body>
</html>
