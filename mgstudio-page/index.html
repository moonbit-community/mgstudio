<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moon Game Studio</title>
    <style>
      :root {
        --content-max-width: 1280px;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        background: #0b0f16;
        color: #ffffff;
      }
      body {
        box-sizing: border-box;
        padding: 24px 16px 28px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        overflow: auto;
        font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }
      .page {
        width: min(100%, var(--content-max-width));
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .page-title {
        margin: 0;
        font-size: 30px;
        font-weight: 600;
        letter-spacing: 0.03em;
      }
      #mgstudio-canvas {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
        background: #070b12;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 12px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
      }
      .menu {
        width: 100%;
        padding: 12px 16px;
        background: rgba(8, 12, 20, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        font-size: 12px;
        color: #f6f8ff;
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow: auto;
      }
      .menu h2 {
        font-size: 14px;
        margin: 0 0 2px 0;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(246, 248, 255, 0.7);
      }
      .menu-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: start;
      }
      .example-group {
        display: grid;
        gap: 8px;
      }
      .example-group h2 {
        margin: 0;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: rgba(246, 248, 255, 0.65);
      }
      .example-buttons {
        display: grid;
        gap: 8px;
      }
      .menu button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 8px 10px;
        background: rgba(28, 36, 58, 0.9);
        color: #f6f8ff;
        cursor: pointer;
        font-size: 12px;
        text-align: left;
      }
      .menu button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      @media (max-width: 980px) {
        .menu-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (max-width: 680px) {
        .menu-grid {
          grid-template-columns: 1fr;
        }
        .page-title {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1 class="page-title">Moon Game Studio Examples</h1>
      <canvas id="mgstudio-canvas" width="1280" height="720" data-mgstudio-size-mode="responsive"></canvas>
      <div id="mgstudio-menu" class="menu">
        <h2>Examples</h2>
        <div class="menu-grid">
          <!-- __EXAMPLE_GROUPS__ -->
        </div>
      </div>
    </main>
    <script type="module" src="./mgstudio-runtime-web.js?v=__RUNTIME_VERSION__"></script>
  </body>
</html>
