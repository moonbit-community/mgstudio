<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moon Game Studio</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0b0f16;
        color: #ffffff;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .menu {
        position: fixed;
        left: 16px;
        top: 16px;
        bottom: 16px;
        padding: 12px 16px;
        background: rgba(8, 12, 20, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        color: #f6f8ff;
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: min(360px, calc(100vw - 32px));
        overflow: auto;
        transform: translateX(0);
        transition: transform 160ms ease;
      }
      .menu.collapsed {
        transform: translateX(calc(-100% + 36px));
      }
      .menu h1 {
        font-size: 12px;
        margin: 0 0 2px 0;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(246, 248, 255, 0.7);
      }
      .menu-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .menu-toggle {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 4px 8px;
        background: rgba(28, 36, 58, 0.9);
        color: #f6f8ff;
        cursor: pointer;
        font-size: 12px;
        line-height: 1;
      }
      .menu-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr;
        align-items: start;
      }
      .example-group {
        display: grid;
        gap: 8px;
      }
      .example-group h2 {
        margin: 0;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: rgba(246, 248, 255, 0.65);
      }
      .example-buttons {
        display: grid;
        gap: 8px;
      }
      .menu button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 8px 10px;
        background: rgba(28, 36, 58, 0.9);
        color: #f6f8ff;
        cursor: pointer;
        font-size: 12px;
        text-align: left;
      }
      .menu button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <canvas id="mgstudio-canvas"></canvas>
    <div id="mgstudio-menu" class="menu">
      <div class="menu-top">
        <h1>Examples</h1>
        <button id="mgstudio-menu-toggle" class="menu-toggle" type="button" aria-expanded="true" aria-label="Collapse examples menu">&lt;</button>
      </div>
      <div class="menu-grid">
        <!-- __EXAMPLE_GROUPS__ -->
      </div>
    </div>
    <script>
      (() => {
        const menu = document.getElementById("mgstudio-menu");
        const toggle = document.getElementById("mgstudio-menu-toggle");
        if (!menu || !toggle) return;
        const applyState = (collapsed) => {
          menu.classList.toggle("collapsed", collapsed);
          toggle.textContent = collapsed ? ">" : "<";
          toggle.setAttribute("aria-expanded", collapsed ? "false" : "true");
          toggle.setAttribute("aria-label", collapsed ? "Expand examples menu" : "Collapse examples menu");
        };
        let collapsed = false;
        toggle.addEventListener("click", () => {
          collapsed = !collapsed;
          applyState(collapsed);
        });
        applyState(false);
      })();
    </script>
    <script type="module" src="./mgstudio-runtime-web.js?v=__RUNTIME_VERSION__"></script>
  </body>
</html>
